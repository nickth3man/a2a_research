[project]
name = "a2a-research"
version = "0.1.0"
description = "Local-first 4-agent A2A research system with PocketFlow orchestration"
requires-python = ">=3.11"
dependencies = [
    # Core
    "pocketflow>=0.0.3",
    "pydantic>=2.7",
    "pydantic-settings>=2.5",
    "rich>=13",
    # UI
    "mesop>=0.12",
    # Vector store
    "chromadb>=0.5",
    # LLM providers (direct SDKs)
    "openai>=1.0",
    "anthropic>=0.40",
    "google-genai>=0.3",
    "ollama>=0.3",
    # Development & quality (all in default profile per project requirement)
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5",
    "pytest-xdist>=3.6",
    "hypothesis>=6.100",
    "ruff>=0.6",
    "mypy>=1.11",
    "pre-commit>=3.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/a2a_research"]

[tool.ruff]
target-version = "py311"
line-length = 99
exclude = [
    ".git",
    ".venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
    ".mypy_cache",
    ".ruff_cache",
    ".pytest_cache",
]
lint.select = [
    "E",
    "F",
    "I",
    "N",
    "UP",
    "B",
    "SIM",
    "TCH",
    "C4",
    "RUF",
    "PIE",
]
lint.ignore = ["E501"]
format.quote-style = "double"
format.indent-style = "space"

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
addopts = "-n auto --cov=src/a2a_research --cov-report=term-missing"

