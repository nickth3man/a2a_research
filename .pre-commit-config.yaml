repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-ast
      - id: debug-statements
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: detect-private-key
      - id: fix-byte-order-marker

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^(src/|tests/)/
      - id: ruff-format
        files: ^(src/|tests/)/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
        args: ["src/"]
        verbose: true
      - id: ty
        name: ty
        entry: uv run ty check
        language: system
        types: [python]
        files: ^src/
        pass_filenames: false
        args: ["src/"]
        verbose: true
