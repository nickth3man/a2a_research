repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
        exclude: ^apps/web/tsconfig.*\.json$
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1000"]
      - id: check-merge-conflict
      - id: check-ast
      - id: debug-statements
      - id: check-case-conflict
      - id: mixed-line-ending
      - id: detect-private-key
      - id: fix-byte-order-marker

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        files: ^apps/api/(agents|core|entrypoints|llm|tools|workflow|tests)/
      - id: ruff-format
        files: ^apps/api/(agents|core|entrypoints|llm|tools|workflow|tests)/

  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: bash -c 'cd apps/api && exec uv run mypy --config-file pyproject.toml agents/ core/ entrypoints/ llm/ tools/ workflow/'
        language: system
        types: [python]
        files: ^apps/api/(agents|core|entrypoints|llm|tools|workflow)/
        pass_filenames: false
        args: []
        verbose: true
      - id: ty
        name: ty
        entry: bash -c 'cd apps/api && exec uv run ty check agents/ core/ entrypoints/ llm/ tools/ workflow/'
        language: system
        types: [python]
        files: ^apps/api/(agents|core|entrypoints|llm|tools|workflow)/
        pass_filenames: false
        args: []
        verbose: true
      - id: pylint-api
        name: pylint (apps/api module length)
        entry: bash -c 'cd apps/api && args=(); for f in "$@"; do args+=("${f#apps/api/}"); done; exec uv run pylint "${args[@]}"' _
        language: system
        types: [python]
        files: ^apps/api/(agents|core|entrypoints|llm|tools|workflow|tests)/.*\.py$
        pass_filenames: true

  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^apps/web/.*\.(ts|tsx|json|md|css|html)$
        types_or: [javascript, jsx, ts, tsx, json, markdown, css, html]

  - repo: local
    hooks:
      - id: eslint-web
        name: eslint (apps/web)
        entry: bash -c 'args=(); for f in "$@"; do args+=("${f#apps/web/}"); done; exec pnpm -C apps/web exec eslint -- "${args[@]}"' _
        language: system
        files: ^apps/web/.*\.(ts|tsx)$
        pass_filenames: true
