name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.filter.outputs.python }}
      frontend: ${{ steps.filter.outputs.frontend }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            python:
              - 'apps/api/**'
            frontend:
              - 'apps/web/**'
            contracts:
              - 'packages/contracts/**'

  pre-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.6.14"

      - name: Cache pre-commit environments
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit|python-3.12|${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Run pre-commit
        uses: tox-dev/action-pre-commit-uv@246b66536e366bb885f52d61983bf32f7c95e8b1 # v1.0.3
        with:
          uv-install: "false"
          extra_args: --show-diff-on-failure --color=always

  lint:
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout repository
        if: needs.changes.outputs.python == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        if: needs.changes.outputs.python == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.6.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        if: needs.changes.outputs.python == 'true'
        run: uv python install 3.11

      - name: Install lint dependencies
        if: needs.changes.outputs.python == 'true'
        run: |
          uv sync --group lint
          uv cache prune --ci

      - name: Lint with Ruff
        if: needs.changes.outputs.python == 'true'
        run: uv run ruff check agents/ core/ entrypoints/ llm/ tools/ workflow/ tests/

      - name: Module length (Pylint too-many-lines)
        if: needs.changes.outputs.python == 'true'
        run: uv run pylint agents core entrypoints llm tools workflow tests

      - name: Check formatting with Ruff
        if: needs.changes.outputs.python == 'true'
        run: uv run ruff format --check agents/ core/ entrypoints/ llm/ tools/ workflow/ tests/

      - name: Type check with mypy
        if: needs.changes.outputs.python == 'true'
        run: uv run mypy agents/ core/ entrypoints/ llm/ tools/ workflow/

      - name: Type check with ty
        if: needs.changes.outputs.python == 'true'
        run: uv run ty check agents/ core/ entrypoints/ llm/ tools/ workflow/

      - name: Verify lockfile is up to date
        if: needs.changes.outputs.python == 'true'
        run: uv lock --check

  test:
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/api
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout repository
        if: needs.changes.outputs.python == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        if: needs.changes.outputs.python == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.6.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        if: needs.changes.outputs.python == 'true'
        run: uv python install ${{ matrix.python-version }}

      - name: Install test dependencies
        if: needs.changes.outputs.python == 'true'
        run: |
          uv sync --group test
          uv cache prune --ci

      - name: Run tests
        if: needs.changes.outputs.python == 'true'
        run: uv run pytest --cov-report=xml --cov-fail-under=85

      - name: Upload coverage to Codecov
        if: needs.changes.outputs.python == 'true' && matrix.python-version == '3.11'
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        if: needs.changes.outputs.python == 'true' && matrix.python-version == '3.11'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  security:
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout repository
        if: needs.changes.outputs.python == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up uv
        if: needs.changes.outputs.python == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.6.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        if: needs.changes.outputs.python == 'true'
        run: uv python install 3.11

      - name: Install dependencies
        if: needs.changes.outputs.python == 'true'
        run: |
          uv sync --all-groups
          uv cache prune --ci

      - name: Run bandit security linter
        if: needs.changes.outputs.python == 'true'
        run: uv run bandit -r agents/ core/ entrypoints/ llm/ tools/ workflow/ -q --severity-level medium --confidence-level high

      - name: Run pip-audit
        if: needs.changes.outputs.python == 'true'
        # CVE-2026-3219: pip 26.0.1 vuln, no fix available yet upstream
        run: uv run pip-audit --ignore-vuln CVE-2026-3219

  frontend:
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout repository
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Cache Turbo builds
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Install pnpm
        if: needs.changes.outputs.frontend == 'true'
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Set up Node.js
        if: needs.changes.outputs.frontend == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: apps/web/package.json

      - name: Install dependencies
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm install

      - name: Lint frontend
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm exec turbo run lint --filter='...[origin/main...HEAD]'

      - name: Build frontend
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm exec turbo run build --filter='...[origin/main...HEAD]'

      - name: Test frontend
        if: needs.changes.outputs.frontend == 'true'
        run: pnpm exec turbo run test --filter='...[origin/main...HEAD]'

  contracts:
    runs-on: ubuntu-latest
    needs: [changes]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: apps/api
    steps:
      - name: Checkout repository
        if: needs.changes.outputs.python == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Cache Turbo builds
        if: needs.changes.outputs.python == 'true'
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ hashFiles('**/turbo.json') }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Set up uv
        if: needs.changes.outputs.python == 'true'
        uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5
        with:
          version: "0.6.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python
        if: needs.changes.outputs.python == 'true'
        run: uv python install 3.11

      - name: Install dependencies
        if: needs.changes.outputs.python == 'true'
        run: |
          uv sync --all-groups
          uv cache prune --ci

      - name: Start API server
        if: needs.changes.outputs.python == 'true'
        run: |
          uv run uvicorn entrypoints.api:app --host 0.0.0.0 --port 8000 &
          sleep 5

      - name: Install pnpm
        if: needs.changes.outputs.python == 'true'
        uses: pnpm/action-setup@7088e561eb65bb68695d245aa206f005ef30921d # v4.1.0

      - name: Set up Node.js
        if: needs.changes.outputs.python == 'true'
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Generate TypeScript client
        if: needs.changes.outputs.python == 'true'
        working-directory: packages/contracts
        run: |
          pnpm install
          pnpm exec turbo run generate --filter='...[origin/main...HEAD]'

  ci-gate:
    if: ${{ !cancelled() }}
    needs: [pre-commit, lint, test, security, frontend, contracts]
    runs-on: ubuntu-latest
    steps:
      - name: Check all jobs
        run: |
          if [ "${{ needs.pre-commit.result }}" = "failure" ] || \
             [ "${{ needs.lint.result }}" = "failure" ] || \
             [ "${{ needs.test.result }}" = "failure" ] || \
             [ "${{ needs.security.result }}" = "failure" ] || \
             [ "${{ needs.frontend.result }}" = "failure" ] || \
             [ "${{ needs.contracts.result }}" = "failure" ]; then
            echo "One or more required jobs failed"
            exit 1
          fi
