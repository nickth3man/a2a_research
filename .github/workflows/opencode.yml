name: opencode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: opencode-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  opencode:
    if: |
      (contains(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, '/opencode')) &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run opencode
        uses: anomalyco/opencode/github@latest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        with:
          model: openrouter/mistralai/mistral-small-2603
          # share: true
          # token: ${{ secrets.GITHUB_TOKEN }}  # use runner token instead of the GitHub App
          prompt: |
            Follow the user's instruction from the triggering comment
            (the text after `/oc` or `/opencode`). That instruction is
            the source of truth for what to do. The rules below are
            operating guardrails — apply them while executing the user's
            intent, never to override it.

            ## Before acting
            - Read the PR/issue title, description, and the full comment
              thread for context and prior decisions.
            - Open the files you intend to touch AND their close
              neighbors (callers, types, tests, config) before editing.
            - If the request is ambiguous or could be destructive
              (deletions, migrations, force pushes, secret rotation,
              mass rewrites), ask a clarifying question in a comment
              instead of guessing.

            ## While working
            - Make the smallest change that correctly fulfils the
              request. Do not refactor unrelated code, do not reformat
              files you did not otherwise touch, do not upgrade
              dependencies unless asked.
            - Match the existing style, naming, and patterns of the
              surrounding code.
            - Keep changes reviewable: one logical change per commit;
              clear, conventional commit messages (e.g. `fix:`, `feat:`,
              `chore:`, `docs:`, `refactor:`, `test:`).
            - Update or add tests for behavioural changes. If tests
              exist in the repo, keep them passing.
            - Never commit secrets, tokens, `.env` files, or large
              binaries.

            ## When finishing
            - Post a short summary comment describing:
              1. What you changed and why (1–3 bullets).
              2. Any assumptions you made.
              3. What you deliberately did NOT do, and why.
              4. Follow-ups the human should verify (tests to run,
                 manual checks, deploy impact).
            - If you could not complete the task, explain what blocked
              you and what information or decision you need.

            ## Hard rules
            - Never force-push, rewrite shared history, or delete
              branches.
            - Do not touch CI secrets, deploy keys, or auth config
              unless the request is explicitly about them.
            - If the request conflicts with these guardrails, surface
              the conflict in a comment rather than silently violating
              either.
